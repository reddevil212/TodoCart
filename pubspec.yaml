name: todocart
description: "A simple for noW Advanced Todo Manager."
publish_to: 'none' 
version: 1.0.0+1
environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  change_app_package_name: ^1.4.0
  provider: ^6.0.5
  url_launcher: ^6.3.1
  cupertino_icons: ^1.0.8
  intl: ^0.20.2
  http: ^1.2.0
  flutter_local_notifications: ^21.0.0
  speech_to_text: ^7.3.0
  flutter_tts: ^4.2.5
  timezone: ^0.11.0
  flutter_timezone: ^5.0.2
  flutter_dotenv: ^5.0.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - .env

